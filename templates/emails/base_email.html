{% load i18n %}<!DOCTYPE html>
<html lang="{{ locale|default:'sr' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}Ćorić Agrar{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, Helvetica, sans-serif; color:#222222;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; background-color:#ffffff; border-radius:6px; overflow:hidden;">
          <tr>
            <td style="background-color:#2e7d32; padding:20px 24px; color:#ffffff; font-size:18px; font-weight:bold;">
              Ćorić Agrar
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px; background-color:#fafafa; color:#888888; font-size:12px;">
              {% translate "Automatska poruka — Ćorić Agrar sajt." %}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
