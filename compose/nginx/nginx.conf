# CORIC_AGRAR — Nginx reverse proxy (production)
# Request flow (architecture:755-757): Request -> Nginx (HTTPS terminacija,
# static fallback) -> Gunicorn (WSGI :8000) -> Django.
# Story 9.1: HTTP/80 blok je FUNKCIONALAN za lokalni smoke (bez cert-a).
# Story 9.2: HTTPS/443 blok je AKTIVAN (certbot/Let's Encrypt cert putanje); :80 sada
# servira ACME challenge (NE redirect) + bezuslovan HTTP->HTTPS 301 redirect za sve ostalo.

# Upstream ka Django/Gunicorn kontejneru (Docker DNS ime servisa "django", port 8000).
upstream django {
    server django:8000;
}

# Sakrij Nginx verziju u Server header-u i error stranicama (security hardening —
# ne odaj verziju banera potencijalnom napadaču).
server_tokens off;

# gzip kompresija — smanjuje payload za tekstualne resurse.
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 256;
gzip_comp_level 5;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/rss+xml
    image/svg+xml
    font/woff2;

# ── HTTP server (port 80) — ACME passthrough + bezuslovan HTTP->HTTPS redirect ──
# Story 9.2/SM-D6: :80 servira SAMO ACME challenge (200/404, NE redirect) i bezuslovno
# redirect-uje sav ostali saobracaj na HTTPS (return 301). Prod-realan, NE env-uslovljen.
server {
    listen 80;
    server_name _;

    # Maksimalna veličina upload-a (sinhronizovano sa Django DATA_UPLOAD_MAX 11MB).
    client_max_body_size 11m;

    # ACME challenge — servira certbot webroot. KONKRETAN path /var/www/certbot
    # (path-contract, AC13/SM-D4 — identican certbot -w i production.yml bind-mount).
    # KRITICNO (AC7/SM-D6): NE redirect-uje se na HTTPS — ostaje 200/404 sa webroot-a
    # (inace certbot validacija FAIL-uje). Mora biti PRE return 301 catch-all-a.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Sav ostali :80 saobracaj -> bezuslovan 301 na HTTPS (AC7/SM-D6).
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server (port 443) — AKTIVAN (Story 9.2 certbot/Let's Encrypt) ─────────
server {
    listen 443 ssl;
    http2 on;
    server_name coricagrar.rs www.coricagrar.rs;

    # Story 9.2: certbot popunjava /etc/letsencrypt/live/<domen>/... (AC7/AC13).
    # Putanje su bind-mount-ovane read-only u nginx kontejner (production.yml).
    ssl_certificate     /etc/letsencrypt/live/coricagrar.rs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coricagrar.rs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Maksimalna veličina upload-a (sinhronizovano sa Django DATA_UPLOAD_MAX 11MB).
    client_max_body_size 11m;

    # Security headeri — `always` emituje i na 4xx/5xx (G-7), ne samo na 2xx.
    # Vrednosti usaglašene sa config/settings/production.py (DENY / nosniff / same-origin).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    # Static fajlovi — Nginx servira DIREKTNO iz deljenog staticfiles volume-a
    # (collectstatic output; deploy-step 9.2). NE proxy na Django (max performanse).
    # alias putanja MORA da poklapa STATIC_ROOT (/app/staticfiles) i nginx mount (G-8).
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        # Nginx semantika: location sa SOPSTVENIM add_header DROPUJE sve nasleđene
        # add_header iz server{} bloka → security headeri se MORAJU re-emitovati ovde.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
    }

    # Media fajlovi — direktan serving iz deljenog media volume-a.
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        # Re-emit security headera (location add_header poništava nasleđivanje, v. /static/).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
    }

    # Sve ostalo -> proxy ka Gunicorn-u.
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # G-3 KLJUČNO: bez X-Forwarded-Proto Django (SECURE_PROXY_SSL_HEADER +
        # SECURE_SSL_REDIRECT) ulazi u beskonačan 301 redirect loop.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# (Story 9.1 zakomentarisan 443 placeholder UKLONJEN — Story 9.2 ga je aktivirao gore.)
