# CORIC_AGRAR — Nginx BOOTSTRAP conf (Story 9.2, AC15/SM-D10).
# HTTP-only first-deploy conf: resava chicken-and-egg (nginx sa 443 + nepostojeci
# cert FAIL-uje da starta, a certbot --webroot trazi nginx koji vec slusa :80).
#
# Koristi se SAMO pri prvom izdavanju cert-a (nginx-init.sh bootstrap faza). Steady-state
# je compose/nginx/nginx.conf (443 aktivan). NEMA nijedan `listen 443 ssl` ovde.

upstream django {
    server django:8000;
}

server_tokens off;

server {
    listen 80;
    server_name _;

    client_max_body_size 11m;

    # Security headeri — `always` emituje i na 4xx/5xx (G-7).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    # ACME challenge — servira certbot webroot. KONKRETAN path /var/www/certbot
    # (path-contract — AC13). NE redirect-uje (bootstrap nema 443 anyway).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Static fajlovi — direktan serving (smoke-friendly tokom bootstrap-a).
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
    }

    location /media/ {
        alias /app/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
    }

    # Sve ostalo -> proxy ka Gunicorn-u (HTTP-only tokom bootstrap-a; NE redirect na 443).
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
