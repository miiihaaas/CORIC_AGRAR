name: CI

# Story 1.9 — GitHub Actions CI Pipeline
# Triggers: push to main/staging, pull_request to main, manual workflow_dispatch (IMP-IT2-4).
# Epic 9 go-live (Story 9.2): master preimenovan u main + dodat staging; build+push GHCR
# image MORA da se okine na ista oba deploy branch-a (main->production, staging) jer
# deploy.yml radi `docker compose pull` tog image-a — bez build-a na staging deploy povlaci stari image.

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:  # IMP-IT2-4: Manual run iz Actions UI - pre-merge dry-run i debugging.

# Workflow-level least-privilege (IMP-1): contents:read za checkout je dovoljno za sve job-ove.
# packages:write je JOB-LEVEL na build job-u (NE workflow-level - lint+test ne diraju GHCR).
permissions:
  contents: read

# Sprecava paralelne CI run-ove za isti branch (IMP-3); cancel-in-progress otkazuje stari run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # IMP-4
    env:
      # CRIT-2 + Gotcha CI-1: defensive insurance (djade>=1.9.0 standalone parser NE poziva
      # Django settings, ali buduce verzije ili nov lint hook mogu - 0-cost insurance).
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-prod-50chars-padding
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6  # Verified 2026-05-29 latest stable major.

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0  # Pin: akcija NEMA pomicni `v8` major alias (samo v8.x.y); v8.2.0 latest 8-line.
        with:
          python-version: '3.13'  # IMP-9: matches pyproject.toml requires-python.
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dev deps
        run: uv sync --frozen --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Djade check
        # djade NE prihvata direktorijum kao arg (testirao Dev iter-1) — koristi se glob
        # eksplicitan po fajlovima koji su tracked u gitu. Story 2.1+ moze siriti scope.
        # Privremeno isklucujemo `templates/base.html` jer djade 1.9.0 konsoliduje `{% load %}`
        # tagove u jednu liniju a Story 1.5/1.6/1.7 testovi pretpostavljaju odvojene
        # `{% load %}` direktive (literal substring assert). Follow-up cleanup PR ce ili
        # ažurirati testove da prihvate konsolidovan oblik, ili restruktuirati base.html.
        # Vidi "Acceptable scope deviations" napomenu o djade scope ekspanziji.
        run: uv run djade --check templates/partials/*.html

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # IMP-4
    env:
      # CRIT-1 + Gotcha CI-1: bez DJANGO_SECRET_KEY env, pytest-django ucitava settings
      # → ImproperlyConfigured exception pre nego pytest collect-uje testove. Ovaj env
      # se prosledjuje u django kontejner kroz `docker compose run -e` (vidi Pytest step).
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-prod-50chars-padding
      # CRIT-IT2-1 + Gotcha CI-7: NAMERNO bez DATABASE_URL — DATABASES dolazi iz compose
      # `db` (PostgreSQL) servisa kroz settings.development; postavljanje override-a ovde
      # bi maskiralo pravo ponasanje. PostgreSQL connection se ne konfigurise env-om na
      # job nivou — `db` servis (compose/local.yml) je autoritativan izvor.
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      # ── STRATEGIJA A (Epic 9 go-live): suite se vozi KROZ Docker, identicno `just test`
      # (`docker compose -f compose/local.yml run --rm django uv run pytest`). Razlog:
      # autoritativno test okruzenje je PostgreSQL + libmagic + poppler baked u runtime
      # image — goli `uv run pytest` na ubuntu/SQLite HARD-FAIL-uje FTS search testove
      # (apps/search traze PostgreSQL po dizajnu) i ops/Docker testove. CI sada matchuje
      # `just test` 1:1 (Docker + Postgres) → FTS + ops + foundational suite je zeleno.
      # compose/local.yml `django` servis ima `env_file: ../.env`; Compose ERROR-uje ako
      # fajl ne postoji. `.env` je gitignore-ovan (samo `.env.example` je tracked), pa ga
      # u CI seedujemo iz template-a. DJANGO_SECRET_KEY u `.env.example` je prazan — ali
      # ga compose run prosledjuje eksplicitno kroz `-e DJANGO_SECRET_KEY` (job env override).
      - name: Seed .env iz .env.example (CI nema gitignore-ovan .env)
        run: cp .env.example .env

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4  # Verified 2026-05-29 latest stable major.

      # Build dev `runtime` target (pytest/ruff/libmagic/poppler u image-u) + GHA layer
      # cache. Tag MORA biti `coric_agrar_django_local` jer compose/local.yml `django`
      # servis ima `image: coric_agrar_django_local` — kad image postoji lokalno,
      # `docker compose run` ga REUSE-uje (ne rebuild-uje) → brzo na warm cache.
      # `load: true` ubacuje image u lokalni docker daemon (buildx default je registry).
      - name: Build local test image (runtime target)
        uses: docker/build-push-action@v7  # Verified 2026-05-29 latest stable major.
        with:
          context: .
          file: ./compose/django/Dockerfile
          target: runtime  # G-4: dev stage sa pytest/ruff (NE prod --no-dev venv).
          load: true
          tags: coric_agrar_django_local
          cache-from: type=gha,scope=test-image  # odvojen scope od build job-a (prod image).
          cache-to: type=gha,mode=max,scope=test-image

      # IMP-IT2-1 + Decision D13: "Django deploy checks" step UKLONJEN — settings.development
      # namerno ima DEBUG=True; continue-on-error: true bi ucinio step placebo. Story 9.6
      # dodaje check --deploy nakon prelaska na settings.production sa strict mode.

      # `docker compose run --rm django uv run pytest` — identicno justfile:41-42.
      # `-e DJANGO_SECRET_KEY` prosledjuje job-level env u kontejner (compose env_file je
      # `../.env` koji u CI ne postoji, pa secret mora eksplicitno). `db` servis se dize
      # automatski preko `depends_on: condition: service_healthy` (pg_isready healthcheck).
      - name: Pytest (kroz Docker — Strategija A)
        run: >
          docker compose -f compose/local.yml run --rm
          -e DJANGO_SECRET_KEY
          django uv run pytest

      # Uredno gasenje: zaustavi `db` (+ ostale) i obrisi volume-e da CI runner ostane
      # cist. `if: always()` — teardown i kad pytest padne (ne ostavlja orphan kontejnere).
      - name: Teardown compose stack
        if: always()
        run: docker compose -f compose/local.yml down -v

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # IMP-4
    needs: [lint, test]  # AC1: build ne sme da krene pre nego lint i test prodju.
    permissions:
      packages: write  # IMP-1: job-level (NE workflow-level); placeholder za Story 9.2 GHCR push.
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4  # Verified 2026-05-29 latest stable major.

      - name: Set lowercase image name
        # IMP-2 + Gotcha CI-2: GHCR zahteva lowercase namespace; ${{ github.repository }}
        # moze biti mixed case (npr. Miiihaaas/CORIC_AGRAR). Koristi env mapping pattern +
        # bash 4+ parametar expansion `${VAR,,}` (defense-in-depth: izbegava shell-injection
        # surface kod direktnog ${{ ... }} expansion-a u run skripti — REFACTOR #9 iter-1).
        env:
          REPO: ${{ github.repository }}
        run: echo "IMAGE_NAME=${REPO,,}" >> $GITHUB_ENV

      - name: Set stable per-branch image tag
        # M2: deploy.sh `docker compose pull` na boxu povlaci STABILAN per-branch tag
        # (ne :ci-<sha>, koji se menja svaki push). production.yml django image default-uje
        # na :latest; box `.env` MORA postaviti IMAGE_TAG po env-u (production prod box,
        # staging staging box) da povuce ovaj tag. Mapiranje (Epic 9 master->main rename):
        #   main -> production, staging -> staging; fallback -> latest.
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "${REF_NAME}" in
            main) STABLE_TAG=production ;;
            staging) STABLE_TAG=staging ;;
            *) STABLE_TAG=latest ;;
          esac
          echo "STABLE_TAG=${STABLE_TAG}" >> $GITHUB_ENV

      # Story 9.2 (AC9/SM-D7): GHCR login aktiviran iz 1.9 deferred placeholder-a.
      # KANONSKA lokacija za GHCR push (NE deploy.yml). secrets.GITHUB_TOKEN + packages:write
      # job-level permission (vec postoji) dozvoljavaju push na ghcr.io.
      - name: Login to GHCR
        uses: docker/login-action@v3  # Verified 2026-06-12 latest stable major.
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker build + push to GHCR (Story 9.2 — deferred push aktiviran)
        uses: docker/build-push-action@v7  # Verified 2026-05-29 latest stable major.
        with:
          context: .
          file: ./compose/django/Dockerfile
          push: true  # Story 9.2 (AC9): GHCR push aktiviran (bilo false u 1.9 smoke).
          # M2: deterministicki :ci-<sha> (immutable audit) + stabilan per-branch tag koji
          # deploy.sh `docker compose pull` na boxu resolve-uje. production.yml django image
          # default-uje na :latest (box .env override-uje IMAGE_TAG per deploy). main -> :production,
          # staging -> :staging (po ref-name-u, fallback :latest).
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.STABLE_TAG }}
          cache-from: type=gha  # GHA layer cache (Decision D10).
          cache-to: type=gha,mode=max
