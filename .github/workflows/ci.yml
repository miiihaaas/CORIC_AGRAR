name: CI

# Story 1.9 — GitHub Actions CI Pipeline
# Triggers: push to master, pull_request to master, manual workflow_dispatch (IMP-IT2-4).
# Future: staging/main branches dodaju se u Epic 9 (Story 9.2).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # IMP-IT2-4: Manual run iz Actions UI - pre-merge dry-run i debugging.

# Workflow-level least-privilege (IMP-1): contents:read za checkout je dovoljno za sve job-ove.
# packages:write je JOB-LEVEL na build job-u (NE workflow-level - lint+test ne diraju GHCR).
permissions:
  contents: read

# Sprecava paralelne CI run-ove za isti branch (IMP-3); cancel-in-progress otkazuje stari run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # IMP-4
    env:
      # CRIT-2 + Gotcha CI-1: defensive insurance (djade>=1.9.0 standalone parser NE poziva
      # Django settings, ali buduce verzije ili nov lint hook mogu - 0-cost insurance).
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-prod-50chars-padding
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6  # Verified 2026-05-29 latest stable major.

      - name: Setup uv
        uses: astral-sh/setup-uv@v8  # Verified 2026-05-29 latest stable major.
        with:
          python-version: '3.13'  # IMP-9: matches pyproject.toml requires-python.
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dev deps
        run: uv sync --frozen --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Djade check
        # djade NE prihvata direktorijum kao arg (testirao Dev iter-1) — koristi se glob
        # eksplicitan po fajlovima koji su tracked u gitu. Story 2.1+ moze siriti scope.
        # Privremeno isklucujemo `templates/base.html` jer djade 1.9.0 konsoliduje `{% load %}`
        # tagove u jednu liniju a Story 1.5/1.6/1.7 testovi pretpostavljaju odvojene
        # `{% load %}` direktive (literal substring assert). Follow-up cleanup PR ce ili
        # ažurirati testove da prihvate konsolidovan oblik, ili restruktuirati base.html.
        # Vidi "Acceptable scope deviations" napomenu o djade scope ekspanziji.
        run: uv run djade --check templates/partials/*.html

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # IMP-4
    env:
      # CRIT-1 + Gotcha CI-1: bez DJANGO_SECRET_KEY env, pytest-django ucitava settings
      # → ImproperlyConfigured exception pre nego pytest collect-uje testove.
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-prod-50chars-padding
      # CRIT-IT2-1 + Gotcha CI-7: NAMERNO bez DATABASE_URL — config/settings/base.py:78
      # default-uje DATABASES na sqlite:///db.sqlite3. Postavljanje override-a bi maskiralo
      # pravo ponasanje (DB na non-default putanji).
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: '3.13'
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Story 2.3 FIX-1: libmagic1 je system dep za python-magic (validate_image_mime).
      # Bez nje, magic.from_buffer() raise-uje pri prvoj invocaciji u CI test runu.
      # poppler-utils future-proofs Story 2.4 PDF cover generator (pdf2image dep).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1 poppler-utils

      - name: Install dev deps
        run: uv sync --frozen --group dev

      # IMP-IT2-1 + Decision D13: "Django deploy checks" step UKLONJEN — settings.development
      # namerno ima DEBUG=True; continue-on-error: true bi ucinio step placebo. Story 9.6
      # dodaje check --deploy nakon prelaska na settings.production sa strict mode.

      - name: Pytest
        run: uv run pytest

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # IMP-4
    needs: [lint, test]  # AC1: build ne sme da krene pre nego lint i test prodju.
    permissions:
      packages: write  # IMP-1: job-level (NE workflow-level); placeholder za Story 9.2 GHCR push.
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4  # Verified 2026-05-29 latest stable major.

      - name: Set lowercase image name
        # IMP-2 + Gotcha CI-2: GHCR zahteva lowercase namespace; ${{ github.repository }}
        # moze biti mixed case (npr. Miiihaaas/CORIC_AGRAR). Koristi env mapping pattern +
        # bash 4+ parametar expansion `${VAR,,}` (defense-in-depth: izbegava shell-injection
        # surface kod direktnog ${{ ... }} expansion-a u run skripti — REFACTOR #9 iter-1).
        env:
          REPO: ${{ github.repository }}
        run: echo "IMAGE_NAME=${REPO,,}" >> $GITHUB_ENV

      - name: Set stable per-branch image tag
        # M2: deploy.sh `docker compose pull` na boxu povlaci STABILAN per-branch tag
        # (ne :ci-<sha>, koji se menja svaki push). production.yml django image default-uje
        # na :latest; deploy override-uje IMAGE_TAG po env-u (staging/production). Mapiranje:
        #   master -> latest, staging -> staging, main -> production; fallback -> latest.
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "${REF_NAME}" in
            master) STABLE_TAG=latest ;;
            staging) STABLE_TAG=staging ;;
            main) STABLE_TAG=production ;;
            *) STABLE_TAG=latest ;;
          esac
          echo "STABLE_TAG=${STABLE_TAG}" >> $GITHUB_ENV

      # Story 9.2 (AC9/SM-D7): GHCR login aktiviran iz 1.9 deferred placeholder-a.
      # KANONSKA lokacija za GHCR push (NE deploy.yml). secrets.GITHUB_TOKEN + packages:write
      # job-level permission (vec postoji) dozvoljavaju push na ghcr.io.
      - name: Login to GHCR
        uses: docker/login-action@v3  # Verified 2026-06-12 latest stable major.
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker build + push to GHCR (Story 9.2 — deferred push aktiviran)
        uses: docker/build-push-action@v7  # Verified 2026-05-29 latest stable major.
        with:
          context: .
          file: ./compose/django/Dockerfile
          push: true  # Story 9.2 (AC9): GHCR push aktiviran (bilo false u 1.9 smoke).
          # M2: deterministicki :ci-<sha> (immutable audit) + stabilan per-branch tag koji
          # deploy.sh `docker compose pull` na boxu resolve-uje. production.yml django image
          # default-uje na :latest (IMAGE_TAG override per deploy). master -> :latest,
          # staging -> :staging, main -> :production (po ref-name-u, fallback :latest).
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.STABLE_TAG }}
          cache-from: type=gha  # GHA layer cache (Decision D10).
          cache-to: type=gha,mode=max
